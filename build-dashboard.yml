name: Build Dashboard

on:
  push:
    branches:
      - main
  schedule:
    # 8 PM AEST is 10 AM UTC
    - cron: '0 10 * * *'

jobs:
  build-dashboard:
    runs-on: default

    steps:
      - name: Checkout # Checkout the PR repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout network-automation-radar-tenants # Checkout the target repo where the dashboard source data lives
        uses: actions/checkout@v4
        with:
          repository: CBA-General/network-automation-radar-tenants
          path: network-automation-radar-tenants
          # Use a PAT with access to the target repo if it is private
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Generate dashboard
        working-directory: ${{ github.workspace }}/network-automation-radar-tenants
        run: python ${{ github.workspace }}/.github/scripts/generate_static_dashboard.py

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-html
          path: /tmp/dashboard.html
          if-no-files-found: error
          retention-days: 1
          overwrite: true
